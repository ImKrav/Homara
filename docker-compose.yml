services:
  db:
    image: postgres:15
    container_name: homara_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "51214:5432"
    volumes:
      - homara_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homara_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/homara?sslmode=disable&connection_limit=10
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homara_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:5000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

volumes:
  homara_pgdata:

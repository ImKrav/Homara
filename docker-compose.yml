services:
  db:
    image: postgres:15
    container_name: homara_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "51214:5432"
    volumes:
      - homara_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homara_backend
    restart: always
    ports:
      - "5000:5000"
      - "5555:5555"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/homara?sslmode=disable&connection_limit=10
    command: sh -c "npx prisma db push && npx tsx prisma/seed.js && (BROWSER=none npx prisma studio --port 5555 --browser none &) && exec npx tsx src/index.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homara_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:5000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

volumes:
  homara_pgdata:
